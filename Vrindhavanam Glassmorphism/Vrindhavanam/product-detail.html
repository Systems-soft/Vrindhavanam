<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Details | Vrindhavanam Estate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Jost:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css?v=3" />
    <link rel="stylesheet" href="css/components.css?v=6" />
    <link rel="stylesheet" href="css/product-pages.css?v=9" />
    <link rel="icon" href="images/logo.png" />
  </head>
  <body class="product-page product-detail-page">
    <nav id="navbar">
      <div class="nav-logo">
        <img
          class="brand-logo-img"
          src="images/logo.png"
          alt="Vrindhavanam Estate logo"
        />
        <span class="brand-lockup">
          <span class="brand-title">Vrindhavanam Estate</span>
          <span class="brand-subtitle">Heritage Since 1932</span>
        </span>
      </div>
      <ul class="nav-links">
        <li><a href="index.html#hero">Home</a></li>
        <li><a href="index.html#about">About</a></li>
        <li><a href="index.html#products">Products</a></li>
        <li><a href="index.html#why">Why Us</a></li>
        <li><a href="index.html#gallery">Gallery</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>
      <div class="nav-right">
        <button
          class="nav-toggle"
          type="button"
          aria-label="Open navigation menu"
          aria-expanded="false"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
        <button class="cart-btn" onclick="openCart()">
          Cart
          <span class="cart-count" id="cartCount">0</span>
        </button>
      </div>
    </nav>

    <main>
      <div class="product-page-shell product-detail-shell">
        <a class="product-back" id="detailBack" href="index.html#products"
          >Back to varieties</a
        >

        <section class="product-detail-hero" id="productDetailPage" hidden>
          <figure class="product-detail-media">
            <img id="detailImage" src="" alt="" />
          </figure>
          <div class="product-detail-copy">
            <div class="section-eyebrow" id="detailLabel">Estate Selection</div>
            <h1 class="section-title" id="detailName">Product Variety</h1>
            <p class="product-detail-description" id="detailDescription"></p>
            <div class="product-detail-meta">
              <span>From</span>
              <strong id="detailPrice">&#8377;0</strong>
            </div>
            <!-- Weight dropdown for detail page -->
            <select id="detailWeightSelect" class="weight-select"></select>
            <button
              type="button"
              class="product-detail-add-btn"
            >
              Add to Cart
            </button>
            <button
              class="product-detail-buy-btn"
              id="detailBuyButton"
              type="button"
            >
              Buy Now
            </button>
          </div>
        </section>

        <!-- Fixed Back to Collection button -->
        <a
          href="index.html#products"
          class="back-to-collection-floating"
          id="floatingBackBtn"
        >
          ← Back to Collection
        </a>
      </div>
    </main>

    <script src="js/main.js?v=3"></script>
    <script src="js/navigation.js?v=2"></script>
  </body>
</html>
